<script>
"use strict";
var ce=React.createElement;
var useState=React.useState,useMemo=React.useMemo,useEffect=React.useEffect,useRef=React.useRef;

var MO=["Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez","Jan","Fev","Mar"];
var FM=["Abril 2026","Maio 2026","Junho 2026","Julho 2026","Agosto 2026","Setembro 2026","Outubro 2026","Novembro 2026","Dezembro 2026","Janeiro 2027","Fevereiro 2027","Marco 2027"];

var iD=[
{id:1,n:"Cartao Junior - Tatuagem",ins:375,rem:2,dd:20,tp:"parcela"},
{id:2,n:"Cartao Junior - Outro",ins:428,rem:10,dd:20,tp:"parcela"},
{id:3,n:"Cartao Pai - Celular",ins:76,rem:4,dd:20,tp:"parcela"},
{id:4,n:"Cartao Pai - Dia 10",ins:380,rem:11,dd:10,tp:"parcela"},
{id:5,n:"Emprestimo Pai",ins:0,rem:1,total:2550,dd:0,tp:"aberto"},
{id:6,n:"Giulio",ins:0,rem:1,total:345,dd:0,tp:"pontual",pm:0},

{id:9,n:"Cartao - Fatura Mai",ins:0,rem:1,total:2000,dd:20,tp:"pontual",pm:1}
];

var fI=[{n:"G7 Pro-labore",v:2000,d:15},{n:"Luquinha (Spotify)",v:15,d:20},{n:"Yago/Giulio",v:20,d:20}];
var fE=[{n:"Academia",v:135,c:"saude"},{n:"Luta",v:100,c:"saude"},{n:"Cabelo",v:200,c:"pessoal"},{n:"Boldo",v:200,c:"pessoal"}];

var CC={"saude":"#4ECDC4","pessoal":"#FF6B6B","parcela":"#FFD93D","pontual":"#6C5CE7","aberto":"#FD79A8","alimentacao":"#FF9F43","transporte":"#00CEC9","lazer":"#E056A0","pix":"#6C5CE7","compras":"#FDCB6E"};
var CL={"saude":"Saude","pessoal":"Pessoal","parcela":"Parcelas","pontual":"Div. Pontuais","aberto":"Emprestimo","alimentacao":"Alimentacao","transporte":"Transporte","lazer":"Lazer","pix":"Pix Enviados","compras":"Compras"};
var TC=["alimentacao","transporte","lazer","pix","compras"];
var EM={"alimentacao":"[A]","transporte":"[T]","lazer":"[L]","pix":"[P]","compras":"[C]"};

var CK={
"alimentacao":"comida almoco almo janta jantar lanche ifood marmita restaurante padaria mercado supermercado acai pizza hamburguer sushi cafe alimenta comer".split(" "),
"transporte":"gasolina gas uber 99 corrida estacionamento pedagio onibus metro transporte combustivel posto".split(" "),
"lazer":"cinema bar balada festa cerveja bebida jogo ingresso show netflix spotify lazer diversao churrasco role".split(" "),
"pix":"pix transferencia ted doc enviou mandou".split(" "),
"compras":"roupa tenis camisa calca bermuda compra loja shopping presente fone".split(" ")
};

function fmt(v){return"R$ "+Math.abs(v).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".")}
function fdt(d){var dt=new Date(d);return dt.toLocaleDateString("pt-BR")}

function dCat(text){
var t=text.toLowerCase();
for(var cat in CK){var kws=CK[cat];for(var j=0;j<kws.length;j++){if(t.indexOf(kws[j])>=0)return cat}}
return null;
}

function pExp(text){
var m=text.match(/(\d+(?:[.,]\d{1,2})?)/);
if(!m)return null;
var v=parseFloat(m[1].replace(",","."));
if(isNaN(v)||v<=0)return null;
var cat=dCat(text);
var desc=text.replace(m[0],"").replace(/^\s*[-]/,"").trim()||text;
return{value:v,category:cat,description:desc,timestamp:Date.now()};
}

function ldExp(){try{return JSON.parse(localStorage.getItem("luan_exp")||"[]")}catch(e){return[]}}
function svExp(x){localStorage.setItem("luan_exp",JSON.stringify(x))}

function AN(props){
var st=useState(props.value);var d=st[0];var sd=st[1];
useEffect(function(){var s=d;var df=props.value-s;if(Math.abs(df)<1){sd(props.value);return}var step=0;var timer=setInterval(function(){step++;sd(s+(df*step)/20);if(step>=20){clearInterval(timer);sd(props.value)}},20);return function(){clearInterval(timer)}},[props.value]);
return ce("span",null,"R$ "+Math.abs(d).toFixed(2).replace(".",","));
}

function MB(props){
var pct=Math.min((props.value/props.max)*100,100);
return ce("div",{style:{width:"100%",height:6,background:"rgba(255,255,255,0.06)",borderRadius:3}},
ce("div",{style:{width:pct+"%",height:"100%",background:props.color,borderRadius:3,transition:"width 0.6s ease"}}));
}

function CP(props){
var r=(props.size-props.sw)/2;var c=2*Math.PI*r;var o=c-(Math.min(props.pct,100)/100)*c;
return ce("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
ce("svg",{width:props.size,height:props.size,style:{transform:"rotate(-90deg)"}},
ce("circle",{cx:props.size/2,cy:props.size/2,r:r,fill:"none",stroke:"rgba(255,255,255,0.06)",strokeWidth:props.sw}),
ce("circle",{cx:props.size/2,cy:props.size/2,r:r,fill:"none",stroke:props.color,strokeWidth:props.sw,strokeDasharray:c,strokeDashoffset:o,strokeLinecap:"round",style:{transition:"stroke-dashoffset 0.8s ease"}})
),
ce("div",{style:{position:"relative",marginTop:-props.size+10,height:props.size-20,display:"flex",alignItems:"center",justifyContent:"center"}},
ce("span",{style:{fontSize:props.size*.22,fontWeight:700,color:"#F8F8F2"}},props.pct.toFixed(0)+"%")
),
props.label?ce("span",{style:{fontSize:11,color:"#8B8B9E",marginTop:4,textAlign:"center"}},props.label):null
);
}

function ChatComp(props){
var _i=useState("");var inp=_i[0];var sInp=_i[1];
var _m=useState([{t:"bot",x:"Registra seus gastos! Ex: '50 almoco', '30 uber', 'pix 200'",ts:0}]);var msgs=_m[0];var sMsgs=_m[1];
var _p=useState(null);var pend=_p[0];var sPend=_p[1];
var ref=useRef(null);

useEffect(function(){if(ref.current)ref.current.scrollTop=ref.current.scrollHeight},[msgs]);

function addM(t,x){sMsgs(function(prev){return prev.concat([{t:t,x:x,ts:Date.now()}])})}

function conf(parsed,cat){
var exp={value:parsed.value,category:cat,description:parsed.description,id:Date.now(),timestamp:Date.now()};
var upd=props.expenses.concat([exp]);
props.setExpenses(upd);svExp(upd);
addM("bot",EM[cat]+" Registrado: "+fmt(exp.value)+" em "+CL[cat]+" ("+exp.description+")");
}

function send(){
var txt=inp.trim();if(!txt)return;
sInp("");addM("user",txt);
if(pend){
var num=parseInt(txt);
if(num>=1&&num<=TC.length){conf(pend,TC[num-1]);sPend(null);return}
addM("bot","Digita o numero (1-5).");return;
}
var tl=txt.toLowerCase();
if(tl==="total"||tl==="resumo"){
var total=props.expenses.reduce(function(s,x){return s+x.value},0);
var bc={};props.expenses.forEach(function(x){bc[x.category]=(bc[x.category]||0)+x.value});
var msg="Total: "+fmt(total)+"\n";
for(var c in bc){msg+=EM[c]+" "+CL[c]+": "+fmt(bc[c])+"\n"}
addM("bot",msg);return;
}
if(tl==="limpar"||tl==="resetar"){props.setExpenses([]);svExp([]);addM("bot","Gastos apagados.");return}
if(tl==="ajuda"||tl==="help"){addM("bot","Comandos:\n- Valor + descricao: '50 almoco'\n- 'total' = resumo\n- 'limpar' = apagar tudo\n- 'hoje' = gastos de hoje\n- 'excluir ultimo' = remove ultimo");return}
if(tl==="hoje"){
var today=new Date().toDateString();
var te=props.expenses.filter(function(x){return new Date(x.timestamp).toDateString()===today});
if(te.length===0){addM("bot","Nenhum gasto hoje.");return}
var t2=te.reduce(function(s,x){return s+x.value},0);
var m2="Hoje: "+fmt(t2)+"\n";
te.forEach(function(x){m2+=EM[x.category]+" "+fmt(x.value)+" "+x.description+"\n"});
addM("bot",m2);return;
}
if(tl.indexOf("excluir")>=0&&tl.indexOf("ultimo")>=0){
if(props.expenses.length===0){addM("bot","Nenhum gasto pra excluir.");return}
var last=props.expenses[props.expenses.length-1];
var upd=props.expenses.slice(0,-1);props.setExpenses(upd);svExp(upd);
addM("bot","Removido: "+fmt(last.value)+" ("+CL[last.category]+")");return;
}
var parsed=pExp(txt);
if(!parsed){addM("bot","Nao entendi. Ex: '50 almoco' ou 'pix 200'");return}
if(parsed.category){conf(parsed,parsed.category)}
else{sPend(parsed);addM("bot","Categoria?\n1. Alimentacao\n2. Transporte\n3. Lazer\n4. Pix\n5. Compras")}
}

var todayT=props.expenses.filter(function(x){return new Date(x.timestamp).toDateString()===new Date().toDateString()}).reduce(function(s,x){return s+x.value},0);
var monthT=props.expenses.reduce(function(s,x){return s+x.value},0);

return ce("div",{style:{display:"flex",flexDirection:"column",gap:12}},
ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
ce("div",{style:{background:"linear-gradient(135deg,rgba(255,159,67,0.08),rgba(255,159,67,0.02))",border:"1px solid rgba(255,159,67,0.15)",borderRadius:14,padding:"14px"}},
ce("div",{style:{fontSize:10,color:"#8B8B9E",letterSpacing:1,textTransform:"uppercase",marginBottom:6}},"Hoje"),
ce("div",{style:{fontSize:18,fontWeight:700,color:"#FF9F43",fontFamily:"'Space Mono',monospace"}},ce(AN,{value:todayT}))
),
ce("div",{style:{background:"linear-gradient(135deg,rgba(253,203,110,0.08),rgba(253,203,110,0.02))",border:"1px solid rgba(253,203,110,0.15)",borderRadius:14,padding:"14px"}},
ce("div",{style:{fontSize:10,color:"#8B8B9E",letterSpacing:1,textTransform:"uppercase",marginBottom:6}},"Este Mes"),
ce("div",{style:{fontSize:18,fontWeight:700,color:"#FDCB6E",fontFamily:"'Space Mono',monospace"}},ce(AN,{value:monthT}))
)
),
props.expenses.length>0?ce("div",{style:{background:"#15151F",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:"16px"}},
ce("div",{style:{fontSize:12,fontWeight:600,marginBottom:12}},"Gastos por Categoria"),
(function(){
var bc={};props.expenses.forEach(function(x){bc[x.category]=(bc[x.category]||0)+x.value});
var mx=1;for(var k in bc){if(bc[k]>mx)mx=bc[k]}
var entries=[];for(var k in bc){entries.push([k,bc[k]])}
entries.sort(function(a,b){return b[1]-a[1]});
return ce("div",{style:{display:"flex",flexDirection:"column",gap:8}},entries.map(function(p){
return ce("div",{key:p[0]},
ce("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
ce("div",{style:{display:"flex",alignItems:"center",gap:6}},
ce("div",{style:{width:8,height:8,borderRadius:"50%",background:CC[p[0]]||"#8B8B9E"}}),
ce("span",{style:{fontSize:11,color:"#C8C8D8"}},CL[p[0]]||p[0])
),
ce("span",{style:{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#F8F8F2"}},fmt(p[1]))
),
ce(MB,{value:p[1],max:mx,color:CC[p[0]]||"#8B8B9E"})
);
}));
})()
):null,
props.expenses.length>0?ce("div",{style:{background:"#15151F",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:"16px"}},
ce("div",{style:{fontSize:12,fontWeight:600,marginBottom:12}},"Ultimos Registros"),
ce("div",{style:{display:"flex",flexDirection:"column",gap:6,maxHeight:150,overflowY:"auto"}},
props.expenses.slice().reverse().slice(0,8).map(function(exp,i){
return ce("div",{key:exp.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}},
ce("div",null,
ce("div",{style:{fontSize:12,color:"#C8C8D8"}},exp.description),
ce("div",{style:{fontSize:9,color:"#5A5A72"}},CL[exp.category]+" - "+fdt(exp.timestamp))
),
ce("span",{style:{fontSize:12,fontFamily:"'Space Mono',monospace",color:"#FF6B6B",fontWeight:600}},"-"+fmt(exp.value))
);
})
)
):null,
ce("div",{style:{background:"#15151F",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,overflow:"hidden"}},
ce("div",{style:{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:8}},
ce("div",{style:{width:8,height:8,borderRadius:"50%",background:"#4ECDC4",animation:"pu 2s infinite"}}),
ce("span",{style:{fontSize:12,fontWeight:600}},"Chat de Gastos"),
ce("span",{style:{fontSize:10,color:"#5A5A72",marginLeft:"auto"}},"'ajuda' p/ comandos")
),
ce("div",{ref:ref,style:{padding:"12px 16px",height:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}},
msgs.map(function(msg,i){
return ce("div",{key:i,className:"mi",style:{display:"flex",justifyContent:msg.t==="user"?"flex-end":"flex-start"}},
ce("div",{style:{maxWidth:"85%",padding:"8px 12px",borderRadius:msg.t==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",background:msg.t==="user"?"#4ECDC4":"rgba(255,255,255,0.04)",color:msg.t==="user"?"#0D0D14":"#C8C8D8",fontSize:12,lineHeight:1.5,whiteSpace:"pre-line"}},msg.x)
);
})
),
ce("div",{style:{padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,0.04)",display:"flex",gap:8}},
ce("input",{type:"text",value:inp,onChange:function(ev){sInp(ev.target.value)},onKeyDown:function(ev){if(ev.key==="Enter")send()},placeholder:"50 almoco, pix 200, uber 25...",style:{flex:1,padding:"10px 14px",borderRadius:20,border:"1px solid rgba(255,255,255,0.06)",background:"#0D0D14",color:"#F8F8F2",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none"}}),
ce("button",{onClick:send,style:{padding:"10px 16px",borderRadius:20,border:"none",cursor:"pointer",background:"#4ECDC4",color:"#0D0D14",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}},"OK")
)
)
);
}

function App(){
var _t=useState("visao");var tab=_t[0];var sTab=_t[1];
var _s=useState(500);var savG=_s[0];var sSavG=_s[1];
var _e=useState(0);var extra=_e[0];var sExtra=_e[1];
var _sm=useState(0);var selM=_sm[0];var sSelM=_sm[1];
var _dp=useState({});var dPay=_dp[0];var sDPay=_dp[1];
var _x=useState(function(){return ldExp()});var exps=_x[0];var sExps=_x[1];
var _debts=useState(function(){try{var s=localStorage.getItem("luan_debts");return s?JSON.parse(s):iD.slice()}catch(e){return iD.slice()}});var debts=_debts[0];var sDebts=_debts[1];
var _ed=useState(null);var editing=_ed[0];var sEditing=_ed[1];

function saveDebts(nd){sDebts(nd);localStorage.setItem("luan_debts",JSON.stringify(nd))}
function addParcela(){saveDebts(debts.concat([{id:Date.now(),n:"Nova parcela",ins:0,rem:1,dd:20,tp:"parcela"}]))}
function addPontual(){saveDebts(debts.concat([{id:Date.now(),n:"Nova divida",ins:0,rem:1,total:0,dd:0,tp:"pontual",pm:0}]))}
function removeDebt(id){saveDebts(debts.filter(function(d){return d.id!==id}))}
function updateDebt(id,key,val){saveDebts(debts.map(function(d){if(d.id===id){var n={};for(var k in d)n[k]=d[k];n[key]=val;return n}return d}))}

var totFI=2035;
var totMI=totFI+extra;
var totFE=635;
var totTr=exps.reduce(function(s,x){return s+x.value},0);
var totDebt=0;for(var j=0;j<debts.length;j++){var d=debts[j];if(d.rem>0)totDebt+=d.tp==="parcela"?d.ins*d.rem:(d.total||0)}

var proj=useMemo(function(){
var ms=[];var pD=debts.map(function(d){return{id:d.id,n:d.n,ins:d.ins,rem:d.rem,dd:d.dd,tp:d.tp,total:d.total,pm:d.pm}});var acc=0;
for(var m=0;m<12;m++){
var md=pD.filter(function(d){return d.rem>0});var tdp=0;
for(var j=0;j<md.length;j++){
var d=md[j];
if(d.tp==="parcela"){tdp+=d.ins}
else if(d.tp==="pontual"&&m===(d.pm||0)){tdp+=d.total}
}
var ep=dPay[5]||0;
var emp=null;for(var j=0;j<pD.length;j++){if(pD[j].id===5)emp=pD[j]}
if(emp&&emp.rem>0&&ep>0){tdp+=Math.min(ep,emp.total)}
var inc=totMI;var exp=totFE+tdp;var bal=inc-exp;acc+=bal;
ms.push({month:MO[m],fullMonth:FM[m],income:inc,fixedExp:totFE,debtPay:tdp,totalExp:exp,balance:bal,accumulated:acc,activeDebts:md.length,debts:md.map(function(d){return{id:d.id,n:d.n,ins:d.ins,rem:d.rem,dd:d.dd,tp:d.tp,total:d.total,pm:d.pm}})});
for(var j=0;j<pD.length;j++){
var d=pD[j];
if(d.tp==="parcela"&&d.rem>0){d.rem--}
else if(d.tp==="pontual"&&m===(d.pm||0)){d.rem=0}
if(d.id===5&&ep>0){d.total=Math.max(0,d.total-ep);if(d.total<=0)d.rem=0}
}
}return ms;
},[totMI,dPay,debts]);

var cm=proj[selM];
var realBal=(cm?cm.balance:0)-totTr;
var SC={background:"#15151F",border:"1px solid rgba(255,255,255,0.04)",borderRadius:14,padding:"18px"};
var SM={fontFamily:"'Space Mono',monospace"};

var tabs=[{id:"visao",l:"Visao Geral"},{id:"gastos",l:"Gastos"},{id:"dividas",l:"Dividas"},{id:"projecao",l:"Projecao"},{id:"config",l:"Ajustes"}];

return ce("div",{style:{minHeight:"100vh",background:"#0D0D14",color:"#F8F8F2",fontFamily:"'DM Sans','Segoe UI',sans-serif"}},
ce("div",{style:{background:"linear-gradient(135deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%)",padding:"28px 24px 20px"}},
ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
ce("div",null,
ce("div",{style:{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#4ECDC4",letterSpacing:3,textTransform:"uppercase",marginBottom:6}},"DASHBOARD"),
ce("div",{style:{fontSize:22,fontWeight:700}},"Luan"),
ce("div",{style:{fontSize:12,color:"#5A5A72",marginTop:4}},"G7 Solucoes Digitais")
),
ce("div",{style:{background:realBal>=0?"rgba(78,205,196,0.12)":"rgba(255,107,107,0.12)",border:"1px solid "+(realBal>=0?"rgba(78,205,196,0.25)":"rgba(255,107,107,0.25)"),borderRadius:12,padding:"10px 16px",textAlign:"right"}},
ce("div",{style:{fontSize:10,color:"#8B8B9E",marginBottom:2}},"Saldo Real"),
ce("div",{style:{fontSize:18,fontWeight:700,fontFamily:"'Space Mono',monospace",color:realBal>=0?"#4ECDC4":"#FF6B6B"}},(realBal>=0?"+":"-")+fmt(realBal))
)
)
),
ce("div",{style:{display:"flex",background:"#12121E",borderBottom:"1px solid rgba(255,255,255,0.04)",overflowX:"auto"}},
tabs.map(function(t){return ce("button",{key:t.id,onClick:function(){sTab(t.id)},style:{flex:1,padding:"14px 8px",background:"none",border:"none",cursor:"pointer",color:tab===t.id?"#4ECDC4":"#5A5A72",borderBottom:tab===t.id?"2px solid #4ECDC4":"2px solid transparent",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}},t.l)})
),
ce("div",{style:{padding:"20px 16px",maxWidth:600,margin:"0 auto"}},

tab==="visao"?ce("div",{style:{display:"flex",flexDirection:"column",gap:16}},
ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
ce("div",{style:{background:"linear-gradient(135deg,rgba(78,205,196,0.08),rgba(78,205,196,0.02))",border:"1px solid rgba(78,205,196,0.15)",borderRadius:14,padding:"16px"}},
ce("div",{style:{fontSize:10,color:"#8B8B9E",textTransform:"uppercase",marginBottom:8}},"Receita"),
